<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register • PageVault</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/pagevault.css}">

    <style>
        body {
            min-height: 100vh;
            background:
                    radial-gradient(1200px 600px at 10% 0%, rgba(13,110,253,.25), transparent 55%),
                    radial-gradient(800px 500px at 100% 10%, rgba(25,135,84,.20), transparent 50%),
                    radial-gradient(900px 600px at 50% 110%, rgba(111,66,193,.20), transparent 55%),
                    #0b1220;
            color: #fff;
        }
        .card-glass {
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .14);
            backdrop-filter: blur(10px);
        }
        .brand-badge {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(25,135,84,.18);
            border: 1px solid rgba(25,135,84,.35);
        }
        .text-muted-2 { color: rgba(255,255,255,.82) !important; }
        .form-control, .form-control:focus {
            background-color: rgba(255,255,255,.12);
            border-color: rgba(255,255,255,.18);
            color: #fff;
            box-shadow: none;
        }
        .form-control::placeholder { color: rgba(255,255,255,.70); }
        .btn-primary {
            background: linear-gradient(135deg, #198754 0%, #0d6efd 100%);
            border: none;
        }
        a { color: rgba(255,255,255,.85); }
        a:hover { color: #fff; }
    </style>
</head>
<body>

<main class="container">
    <div class="row min-vh-100 align-items-center justify-content-center py-5">
        <div class="col-12 col-md-9 col-lg-7 col-xl-5">
            <div class="card card-glass shadow-lg text-white rounded-4">
                <div class="card-body p-4 p-md-5">

                    <div class="d-flex align-items-center gap-3 mb-4">
                        <div class="brand-badge">
                            <i class="bi bi-person-plus fs-3"></i>
                        </div>
                        <div>
                            <h1 class="h4 mb-1">Create your account</h1>
                            <div class="text-muted-2 small">Register to access catalog, orders, and purchases.</div>
                        </div>
                    </div>

                    <div th:if="${error}" class="alert alert-danger py-2" role="alert">
                        <i class="bi bi-exclamation-triangle me-1"></i>
                        <span th:text="${error}">Something went wrong.</span>
                    </div>
                    <div th:if="${success}" class="alert alert-success py-2" role="alert">
                        <i class="bi bi-check-circle me-1"></i>
                        <span th:text="${success}">Account created.</span>
                    </div>

                    <form th:action="@{/register}" method="post" class="needs-validation" novalidate>
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent text-white border border-opacity-25">
                                    <i class="bi bi-person"></i>
                                </span>
                                <input class="form-control" type="text" name="username" placeholder="Choose a username" required>
                                <div class="invalid-feedback">Username is required.</div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent text-white border border-opacity-25">
                                    <i class="bi bi-envelope"></i>
                                </span>
                                <input class="form-control" type="email" name="email" placeholder="name@example.com" required>
                                <div class="invalid-feedback">Valid email is required.</div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent text-white border border-opacity-25">
                                    <i class="bi bi-shield-lock"></i>
                                </span>
                                <input class="form-control" type="password" name="password" placeholder="Create a password" required>
                                <div class="invalid-feedback">Password is required.</div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2">
                            <i class="bi bi-check2-circle me-1"></i>
                            Register
                        </button>
                    </form>

                    <div class="d-flex justify-content-between align-items-center mt-4">
                        <a th:href="@{/login}" class="text-decoration-none">
                            Already have an account? Login
                        </a>
                        <form th:action="@{/logout}" method="post" class="m-0">
                            <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="text-center text-muted-2 small mt-3">
                © <span th:text="${#dates.format(#dates.createNow(),'yyyy')}">2026</span> PageVault • CSE 3220 (KUET)
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script>
    (() => {
        'use strict';
        const forms = document.querySelectorAll('.needs-validation');
        Array.from(forms).forEach(form => {
            form.addEventListener('submit', event => {
                if (!form.checkValidity()) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                form.classList.add('was-validated');
            }, false);
        });
    })();
</script>
</body>
</html>
