<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Account • PageVault</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/pagevault.css}">

    <style>
        body {
            min-height: 100vh;
            background:
                    radial-gradient(1200px 600px at 10% 0%, rgba(13,110,253,.20), transparent 55%),
                    radial-gradient(900px 600px at 100% 10%, rgba(25,135,84,.16), transparent 55%),
                    #0b1220;
            color: #e9eef7;
        }
        .glass {
            background: rgba(255,255,255,.06);
            border: 1px solid rgba(255,255,255,.12);
            backdrop-filter: blur(10px);
        }
        .muted { color: rgba(233,238,247,.80); }
        .btn-primary {
            background: linear-gradient(135deg, #0d6efd 0%, #6f42c1 100%);
            border: none;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark py-3">
    <div class="container">
        <a class="navbar-brand fw-semibold" th:href="@{/}"><i class="bi bi-book-half me-2"></i>PageVault</a>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-light btn-sm" th:href="@{/dashboard}"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button class="btn btn-primary btn-sm" type="submit">Logout</button>
            </form>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
            <div class="glass rounded-4 p-4 p-md-5">
                <div class="d-flex align-items-center gap-3 mb-3">
                    <div class="fs-2"><i class="bi bi-person-circle"></i></div>
                    <div>
                        <h1 class="h3 mb-1">My Account</h1>
                        <div class="muted">Session and profile overview</div>
                    </div>
                </div>

                <div class="alert alert-info" th:if="${username}">
                    You are logged in as <strong th:text="${username}">user</strong>.
                </div>
                <div class="alert alert-warning" th:unless="${username}">
                    You are not logged in.
                </div>

                <div class="d-flex flex-wrap gap-2">
                    <a class="btn btn-primary" th:href="@{/books}"><i class="bi bi-grid me-1"></i>Books Catalog</a>
                    <a class="btn btn-outline-light" th:href="@{/orders/new}"><i class="bi bi-bag-plus me-1"></i>Create Order</a>
                    <a class="btn btn-outline-light" th:href="@{/purchases}"><i class="bi bi-receipt me-1"></i>Purchases</a>
                    <a class="btn btn-outline-light" th:href="@{/}"><i class="bi bi-house me-1"></i>Back to Home</a>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
