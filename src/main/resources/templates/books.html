<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Books Catalog • PageVault</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/pagevault.css}">

    <style>
        body {
            min-height: 100vh;
            background:
                    radial-gradient(1200px 600px at 10% 0%, rgba(13,110,253,.20), transparent 55%),
                    radial-gradient(900px 600px at 100% 10%, rgba(25,135,84,.16), transparent 55%),
                    #0b1220;
            color: #e9eef7;
        }
        .glass {
            background: rgba(255,255,255,.06);
            border: 1px solid rgba(255,255,255,.12);
            backdrop-filter: blur(10px);
        }
        .muted { color: rgba(233,238,247,.80); }
        .table thead th { color: rgba(233,238,247,.85); }
        .table td, .table th { border-color: rgba(255,255,255,.10) !important; }
        .table { color: #e9eef7; }
        .form-control, .form-control:focus {
            background-color: rgba(255,255,255,.10);
            border-color: rgba(255,255,255,.16);
            color: #fff;
            box-shadow: none;
        }
        .form-control::placeholder { color: rgba(255,255,255,.70); }
        .btn-primary {
            background: linear-gradient(135deg, #0d6efd 0%, #6f42c1 100%);
            border: none;
        }
        .badge-soft {
            background: rgba(13,110,253,.18);
            border: 1px solid rgba(13,110,253,.35);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark py-3">
    <div class="container">
        <a class="navbar-brand fw-semibold" th:href="@{/}"><i class="bi bi-book-half me-2"></i>PageVault</a>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-light btn-sm" th:href="@{/dashboard}"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a>
            <a class="btn btn-primary btn-sm" th:href="@{/orders/new}"><i class="bi bi-bag-plus me-1"></i>Create Order</a>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="d-flex justify-content-between align-items-end flex-wrap gap-2 mb-3">
        <div>
            <h1 class="h3 mb-1">Books Catalog</h1>
            <div class="muted">Search by title or author. Only in-stock items are shown.</div>
        </div>
        <div class="badge badge-soft rounded-pill px-3 py-2">
            <i class="bi bi-collection me-1"></i>
            <span th:text="'Results: ' + ${resultCount}">Results: 0</span>
        </div>
    </div>

    <div class="glass rounded-4 p-3 p-md-4 mb-3">
        <form th:action="@{/books}" method="get" class="row g-2 align-items-center">
            <div class="col-12 col-md-8">
                <div class="input-group">
                    <span class="input-group-text bg-transparent text-white border border-opacity-25">
                        <i class="bi bi-search"></i>
                    </span>
                    <input class="form-control" type="text" name="q" th:value="${q}" placeholder="Search: Clean Code, Robert C. Martin...">
                </div>
            </div>
            <div class="col-12 col-md-4 d-grid d-md-flex gap-2 justify-content-md-end">
                <button class="btn btn-primary" type="submit"><i class="bi bi-search me-1"></i>Search</button>
                <a class="btn btn-outline-light" th:href="@{/books}"><i class="bi bi-x-circle me-1"></i>Clear</a>
            </div>
        </form>
    </div>

    <div class="glass rounded-4 p-0 overflow-hidden">
        <div class="table-responsive" th:if="${!#lists.isEmpty(books)}">
            <table class="table table-hover mb-0 align-middle">
                <thead>
                <tr>
                    <th class="ps-4">#</th>
                    <th>Title</th>
                    <th>Author</th>
                    <th class="text-end">Price</th>
                    <th class="text-end">Stock</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="book : ${books}">
                    <td class="ps-4 fw-semibold" th:text="${book.id}">1</td>
                    <td>
                        <div class="fw-semibold" th:text="${book.title}">Title</div>
                        <div class="small muted">Book ID: <span th:text="${book.id}">1</span></div>
                    </td>
                    <td th:text="${book.author}">Author</td>
                    <td class="text-end" th:text="${book.price}">0.0</td>
                    <td class="text-end">
                        <span class="badge text-bg-success" th:if="${book.stockQuantity != null and book.stockQuantity > 0}" th:text="${book.stockQuantity}">1</span>
                        <span class="badge text-bg-secondary" th:unless="${book.stockQuantity != null and book.stockQuantity > 0}">0</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="p-4" th:if="${#lists.isEmpty(books)}">
            <div class="d-flex align-items-center gap-3">
                <div class="fs-1"><i class="bi bi-inboxes"></i></div>
                <div>
                    <div class="fw-semibold">No books found</div>
                    <div class="muted">Try a different keyword, or clear your search.</div>
                </div>
            </div>
        </div>
    </div>

    <div class="d-flex flex-wrap gap-2 mt-3">
        <a class="btn btn-primary" th:href="@{/orders/new}"><i class="bi bi-bag-plus me-1"></i>Create Order</a>
        <a class="btn btn-outline-light" th:href="@{/purchases}"><i class="bi bi-receipt me-1"></i>Purchases</a>
        <a class="btn btn-outline-light" th:href="@{/dashboard}"><i class="bi bi-speedometer2 me-1"></i>Back to Dashboard</a>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
