## Render-ready configuration

# App
spring.application.name=pagevault

# Render injects PORT automatically; fallback is helpful for local runs
server.port=${PORT:8081}

# PostgreSQL (Render) - configure via Render Environment Variables
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Safety: don't auto-run data.sql on every deploy
spring.sql.init.mode=never
