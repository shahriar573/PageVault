# Test profile: uses Testcontainers via @DynamicPropertySource in integration tests.
# For unit tests / slice tests, this profile can still be activated if desired.

spring.main.banner-mode=off
logging.level.root=WARN

# Use an in-memory DB for unit tests so they don't require a running local PostgreSQL.
spring.datasource.url=jdbc:h2:mem:pagevault_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=never

# Avoid Spring Boot trying to manage Docker Compose during tests
spring.docker.compose.enabled=false

